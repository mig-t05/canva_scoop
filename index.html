<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCOOP Distributed Computing Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --panel-bg: #1e293b;
            --text: #f8fafc;
            --origin-color: #0ea5e9;
            --broker-color: #ef4444;
            --worker-color: #10b981;
            --packet-color: #eab308;
            --return-color: #3b82f6;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Bảng điều khiển & Thống kê */
        .dashboard {
            background-color: var(--panel-bg);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .controls { display: flex; gap: 15px; }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover { background-color: #2563eb; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        button:disabled { background-color: #475569; cursor: not-allowed; transform: none; }
        
        #addWorkerBtn { background-color: #8b5cf6; }
        #addWorkerBtn:hover { background-color: #7c3aed; }

        .stats {
            display: flex;
            gap: 30px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .stat-item { display: flex; align-items: center; gap: 10px; }
        .stat-val { font-size: 1.5rem; }
        .stat-pending .stat-val { color: var(--packet-color); }
        .stat-processing .stat-val { color: var(--worker-color); }
        .stat-completed .stat-val { color: var(--return-color); }

        /* Không gian mạng lưới mô phỏng */
        .network-area {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 40px 100px;
        }

        /* Các Nút (Nodes) */
        .node {
            background: #0f172a;
            border: 2px solid;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 5;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .node i { font-size: 2.5rem; margin-bottom: 10px; }
        .node span { font-weight: 600; font-size: 0.9rem; letter-spacing: 0.5px; }

        #origin { border-color: var(--origin-color); width: 140px; height: 140px; box-shadow: 0 0 20px rgba(14, 165, 233, 0.2); }
        #origin i { color: var(--origin-color); }

        #broker { border-color: var(--broker-color); width: 180px; height: 180px; border-radius: 50%; box-shadow: 0 0 30px rgba(239, 68, 68, 0.2); }
        #broker i { color: var(--broker-color); font-size: 3.5rem; }

        .workers-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
            justify-content: center;
        }

        .worker {
            border-color: #334155; /* Mặc định màu xám khi rảnh */
            width: 120px;
            height: 100px;
            color: #94a3b8;
        }
        
        .worker.active {
            border-color: var(--worker-color);
            color: var(--text);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
            animation: pulseWorker 1s infinite alternate;
        }
        
        .worker.active i { color: var(--worker-color); }

        @keyframes pulseWorker {
            from { box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
            to { box-shadow: 0 0 25px rgba(16, 185, 129, 0.6); transform: scale(1.05); }
        }

        /* Gói dữ liệu (Futures/Tác vụ) */
        .packet {
            position: absolute;
            width: 14px;
            height: 14px;
            background-color: var(--packet-color);
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 0 10px var(--packet-color), 0 0 20px var(--packet-color);
            pointer-events: none;
            /* Căn tâm packet với tọa độ */
            transform: translate(-50%, -50%);
        }

        .packet.returning {
            background-color: var(--return-color);
            box-shadow: 0 0 10px var(--return-color), 0 0 20px var(--return-color);
        }

    </style>
</head>
<body>

    <div class="dashboard">
        <div class="controls">
            <button id="addTasksBtn" onclick="createTasks()"><i class="fa-solid fa-paper-plane"></i> Tạo 15 Tác vụ</button>
            <button id="addWorkerBtn" onclick="addWorker()"><i class="fa-solid fa-plus"></i> Thêm Worker (3/6)</button>
        </div>
        <div class="stats">
            <div class="stat-item stat-pending">
                <span>Chờ xếp hàng:</span>
                <span class="stat-val" id="val-pending">0</span>
            </div>
            <div class="stat-item stat-processing">
                <span>Đang xử lý:</span>
                <span class="stat-val" id="val-processing">0</span>
            </div>
            <div class="stat-item stat-completed">
                <span>Hoàn thành:</span>
                <span class="stat-val" id="val-completed">0</span>
            </div>
        </div>
    </div>

    <div class="network-area" id="network">
        <div class="node" id="origin">
            <i class="fa-solid fa-laptop-code"></i>
            <span>Worker Origin</span>
        </div>
        
        <div class="node" id="broker">
            <i class="fa-solid fa-network-wired"></i>
            <span>Message Broker</span>
        </div>

        <div class="workers-container" id="workers-container">
            <div class="node worker" id="worker-1">
                <i class="fa-solid fa-server"></i>
                <span>Worker 1</span>
            </div>
            <div class="node worker" id="worker-2">
                <i class="fa-solid fa-server"></i>
                <span>Worker 2</span>
            </div>
            <div class="node worker" id="worker-3">
                <i class="fa-solid fa-server"></i>
                <span>Worker 3</span>
            </div>
        </div>
    </div>

    <script>
        // Trạng thái hệ thống
        let stats = { pending: 0, processing: 0, completed: 0 };
        let workerCount = 3;
        const MAX_WORKERS = 6;
        let taskQueue = []; // Chứa các ID của tác vụ đang chờ
        let workerStatus = [
            { id: 'worker-1', busy: false },
            { id: 'worker-2', busy: false },
            { id: 'worker-3', busy: false }
        ];
        
        // Cấu hình tốc độ di chuyển (Tính bằng mili-giây)
        const ANIMATION_SPEED = 1500;

        // Cập nhật bảng thống kê UI
        function updateUI() {
            document.getElementById('val-pending').innerText = stats.pending;
            document.getElementById('val-processing').innerText = stats.processing;
            document.getElementById('val-completed').innerText = stats.completed;
        }

        // Thêm 1 Worker mới vào mạng
        function addWorker() {
            if (workerCount >= MAX_WORKERS) return;
            workerCount++;
            
            const container = document.getElementById('workers-container');
            const workerId = `worker-${workerCount}`;
            
            const newWorker = document.createElement('div');
            newWorker.className = 'node worker';
            newWorker.id = workerId;
            newWorker.innerHTML = `<i class="fa-solid fa-server"></i><span>Worker ${workerCount}</span>`;
            
            container.appendChild(newWorker);
            workerStatus.push({ id: workerId, busy: false });
            
            document.getElementById('addWorkerBtn').innerHTML = `<i class="fa-solid fa-plus"></i> Thêm Worker (${workerCount}/${MAX_WORKERS})`;
            if (workerCount === MAX_WORKERS) {
                document.getElementById('addWorkerBtn').disabled = true;
            }
        }

        // Hàm tính tọa độ tâm của một element
        function getCenterPoint(elementId) {
            const el = document.getElementById(elementId);
            const rect = el.getBoundingClientRect();
            return {
                x: rect.left + rect.width / 2,
                y: rect.top + rect.height / 2
            };
        }

        // Tạo 15 tác vụ (Futures)
        function createTasks() {
            for (let i = 0; i < 15; i++) {
                taskQueue.push(`task-${Date.now()}-${Math.random()}`);
                stats.pending++;
            }
            updateUI();
        }

        // Vòng lặp điều phối của Broker (chạy mỗi 100ms)
        setInterval(() => {
            if (taskQueue.length > 0) {
                // Tìm một worker rảnh rỗi
                const idleWorkerIndex = workerStatus.findIndex(w => !w.busy);
                
                if (idleWorkerIndex !== -1) {
                    // Cấp việc cho worker này
                    workerStatus[idleWorkerIndex].busy = true;
                    taskQueue.shift(); // Lấy task ra khỏi hàng đợi
                    
                    stats.pending--;
                    stats.processing++;
                    updateUI();
                    
                    // Khởi chạy Animation chu trình của tác vụ
                    animateTaskLifecycle(workerStatus[idleWorkerIndex]);
                }
            }
        }, 100);

        // Chu trình sống của một tác vụ
        async function animateTaskLifecycle(workerData) {
            const originPos = getCenterPoint('origin');
            const brokerPos = getCenterPoint('broker');
            const workerPos = getCenterPoint(workerData.id);
            const workerEl = document.getElementById(workerData.id);

            // Tạo phần tử giao diện cho tác vụ (Packet)
            const packet = document.createElement('div');
            packet.className = 'packet';
            document.body.appendChild(packet);

            try {
                // 1. Origin -> Broker (Gửi Yêu cầu)
                await animateElement(packet, originPos, brokerPos, ANIMATION_SPEED);
                
                // 2. Broker -> Worker (Phân phối Tác vụ)
                await animateElement(packet, brokerPos, workerPos, ANIMATION_SPEED);

                // 3. Worker đang xử lý (Giả lập thời gian ngẫu nhiên 2s - 5s)
                packet.style.display = 'none'; // Ẩn packet đi, hiển thị worker đang bận
                workerEl.classList.add('active');
                workerEl.innerHTML = `<i class="fa-solid fa-gear fa-spin"></i><span>Đang xử lý...</span>`;
                
                const processTime = Math.floor(Math.random() * 3000) + 2000;
                await new Promise(r => setTimeout(r, processTime));

                // 4. Xử lý xong, Worker gửi kết quả lại
                workerEl.classList.remove('active');
                workerEl.innerHTML = `<i class="fa-solid fa-server"></i><span>Worker ${workerData.id.split('-')[1]}</span>`;
                
                packet.style.display = 'block';
                packet.classList.add('returning'); // Đổi màu xanh
                
                // Điểm khởi đầu lấy lại vì trình duyệt có thể bị resize trong lúc đợi
                const currentWorkerPos = getCenterPoint(workerData.id);
                const currentBrokerPos = getCenterPoint('broker');
                const currentOriginPos = getCenterPoint('origin');

                // 5. Worker -> Broker (Trả kết quả)
                await animateElement(packet, currentWorkerPos, currentBrokerPos, ANIMATION_SPEED);

                // 6. Broker -> Origin (Origin ghi nhận)
                await animateElement(packet, currentBrokerPos, currentOriginPos, ANIMATION_SPEED);

            } finally {
                // Dọn dẹp
                packet.remove();
                
                // Cập nhật thống kê
                stats.processing--;
                stats.completed++;
                updateUI();
                
                // Giải phóng worker để nhận việc tiếp
                workerData.busy = false;
            }
        }

        // Hàm hỗ trợ tạo hiệu ứng di chuyển sử dụng Web Animations API
        function animateElement(element, fromPos, toPos, duration) {
            return new Promise(resolve => {
                const animation = element.animate([
                    { left: `${fromPos.x}px`, top: `${fromPos.y}px` },
                    { left: `${toPos.x}px`, top: `${toPos.y}px` }
                ], {
                    duration: duration,
                    easing: 'ease-in-out',
                    fill: 'forwards'
                });

                animation.onfinish = resolve;
            });
        }
    </script>
</body>
</html>
